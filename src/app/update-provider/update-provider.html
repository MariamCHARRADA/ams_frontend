<h2 align='center'>update-provider</h2>
<ng-container *ngIf="provider as provider"> <!-- use async pipe to wait until data is ready -->
    <div class="form-group">
        <label for="Idprovider">Provider ID</label>
        <input type="number" class="form-control" id="idProvider" disabled>
    </div>
    <div class="form-group">
        <label for="providerName">Provider Name</label>
        <input type="text" [(ngModel)]="providerName" class="form-control" id="providerName">
    </div>
    <div class="form-group">
        <label for="providerEmail">Provider Email</label>
        <input type="email" [(ngModel)]="providerEmail" class="form-control" id="providerEmail"
            aria-describedby="emailHelp">
    </div>
    <div class="form-group">
        <label for="providerAddress">Provider Address</label>
        <input type="text" [(ngModel)]="providerAddress" class="form-control" id="providerAddress">
    </div>
    <button style="margin-top: 1%;" (click)="updateProvider()" class="btn btn-primary">Update Provider</button>
</ng-container>
